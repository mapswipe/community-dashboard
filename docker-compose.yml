services:
  react:
    command: sh -c 'yarn install --frozen-lockfile && yarn start'
    build:
      context: ./
      target: dev
    tty: true
    environment:
      NODE_OPTIONS: --openssl-legacy-provider
      REACT_APP_ENVIRONMENT: ${APP_ENVIRONMENT:-DEV}
      REACT_APP_GRAPHQL_ENDPOINT: ${APP_GRAPHQL_API_DOMAIN:-http://localhost:8000}
      GRAPHQL_CODEGEN_ENDPOINT: ${APP_GRAPHQL_CODEGEN_ENDPOINT:-./backend/schema.graphql}
      REACT_APP_SENTRY_DSN: ${REACT_APP_SENTRY_DSN:-}
    env_file:
      - .env
    volumes:
      - .:/code
    ports:
      - '3080:3080'
