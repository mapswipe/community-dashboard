services:
  react:
    command: sh -c 'env && yarn install --frozen-lockfile && yarn start'
    build:
      context: ../
      target: dev
    tty: true
    environment:
      NODE_OPTIONS: --openssl-legacy-provider
      REACT_APP_ENVIRONMENT: ${REACT_APP_ENVIRONMENT:-DEV}
      REACT_APP_GRAPHQL_ENDPOINT: ${REACT_APP_GRAPHQL_ENDPOINT:-http://localhost:8000/graphql/}
      GRAPHQL_CODEGEN_ENDPOINT: ${APP_GRAPHQL_CODEGEN_ENDPOINT:-./backend/schema.graphql}
      REACT_APP_MAPSWIPE_WEBSITE: ${REACT_APP_MAPSWIPE_WEBSITE:-https://mapswipe.org}
      # TODO: Make the DSN env variable optional in env
      REACT_APP_SENTRY_DSN: ${REACT_APP_SENTRY_DSN:-}
      REACT_APP_SENTRY_TRACES_SAMPLE_RATE: ${REACT_APP_SENTRY_TRACES_SAMPLE_RATE:-}
    env_file:
      - ../.env
    volumes:
      - ../:/code
    ports:
      - '3080:3080'
